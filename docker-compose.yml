version: "3.8"

services:
  # Base de datos PostgreSQL
  db:
    image: postgres:15-alpine
    container_name: banco_lite_db
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-banco_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-banco_password}
      POSTGRES_DB: ${POSTGRES_DB:-banco_lite}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - banco_network
    restart: unless-stopped

  # Backend Flask
  backend:
    build: ./backend
    container_name: banco_lite_backend
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-banco_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-banco_password}
      POSTGRES_DB: ${POSTGRES_DB:-banco_lite}
      DB_HOST: db
      DB_PORT: ${DB_PORT:-5432}
      FLASK_ENV: ${FLASK_ENV:-development}
      FLASK_DEBUG: ${FLASK_DEBUG:-1}
    ports:
      - "5000:5000"
    depends_on:
      - db
    networks:
      - banco_network
    restart: unless-stopped
    volumes:
      - ./backend:/app
    command: >
      sh -c "
        echo 'Esperando a que la base de datos esté lista...' &&
        while ! nc -z db 5432; do
          sleep 1
        done &&
        echo 'Base de datos lista!' &&
        python app.py
      "

  # Frontend Nginx
  frontend:
    build: ./frontend
    container_name: banco_lite_frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - banco_network
    restart: unless-stopped

volumes:
  postgres_data:
    driver: local

networks:
  banco_network:
    driver: bridge
